<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del servidor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            color: #1a1a1a;
        }

        .message {
            font-size: 1.2rem;
            color: #666;
            margin-top: 1rem;
        }

        .link {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.6rem 1.5rem;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .link:hover {
            background: #1a1a1a;
            color: #f9f9f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">500</div>
        <p class="message">Algo salió mal de nuestro lado. Intenta de nuevo en un momento.</p>
        <a href="/" class="link">← Volver al inicio</a>
    </div>
</body>
</html>
