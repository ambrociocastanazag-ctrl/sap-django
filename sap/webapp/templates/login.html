{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="container">
    <div class="card">
        <p class="eyebrow">Acceso Restringido</p>
        <h1 class="title">Identifícate</h1>
        <p class="subtitle">Ingresa tus credenciales para continuar</p>

        <form method="post" class="login-form">
            {% csrf_token %}
            
            {% if form.errors %}
                <ul class="errorlist">
                    <li>Usuario o contraseña incorrectos.</li>
                </ul>
            {% endif %}

            <div class="form-group">
                <label for="id_username">Usuario</label>
                <input type="text" name="username" id="id_username" placeholder="Tu usuario" required>
            </div>

            <div class="form-group">
                <label for="id_password">Contraseña</label>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-login">
                Entrar al Sistema
            </button>
        </form>

        <a href="{% url 'bienvenido' %}" style="display: block; margin-top: 20px; font-size: 0.8rem; color: #4e5265; text-decoration: none;">
            ← Volver a inicio
        </a>
    </div>
</div>

</body>
</html>
