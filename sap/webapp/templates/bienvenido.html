{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/bienvenida.css' %}">
</head>
<body>

<div class="container">

    <div class="card">
        <p class="eyebrow">Sistema</p>
        <h1 class="title">Bienvenido</h1>
        <p class="subtitle">Gestiona personas y domicilios de forma simple y rápida</p>

        <div class="counter">
            {{ no_personas }} personas registradas
        </div>

        <div class="actions">
            <a href="{% url 'mostrar_personas' %}" class="btn btn-users">
                👥 Gestionar usuarios
            </a>

            <a href="{% url 'mostrar_domicilios' %}" class="btn btn-home">
                🏠 Gestionar domicilios
            </a>
        </div>
    </div>

</div>

</body>
</html>
