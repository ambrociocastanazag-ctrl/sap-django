{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Editar Domicilio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/editar.css' %}">
</head>

<body>

<div class="container">
    <div class="card">
        <h2 class="title">Editar Domicilio</h2>

        <!-- FORM PRINCIPAL -->
        <form method="POST">
            {% csrf_token %}

            {% for campo in forma_domicilio %}
                <div class="form-group">
                    <label class="label">{{ campo.label }}</label>
                    {{ campo }}
                    <div class="error">
                        {{ campo.errors }}
                    </div>
                </div>
            {% endfor %}

            <!-- BOTONES -->
            <div class="actions">
                <a class="btn btn-primary" href="javascript:history.back()">← Volver</a>

                <button type="submit" class="btn">
                    Guardar
                </button>
            </div>
        </form>

        <!-- BOTÓN QUE ABRE MODAL -->
        <button type="button" class="btn btn-danger" onclick="abrirModal()">
            Eliminar domicilio
        </button>

    </div>
</div>

<!-- MODAL FUERA DE TODOS LOS FORM -->
<div id="modal" class="modal">
    <div class="modal-content">
        <p>¿Seguro que deseas eliminar este domicilio?</p>

        <div class="modal-actions">
            <!-- CANCELAR -->
            <button type="button" class="btn" onclick="cerrarModal()">
                Cancelar
            </button>

            <!-- FORM ELIMINAR -->
            <form action="{% url 'eliminar_domicilio' domicilio.id %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">
                    Sí, eliminar
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function abrirModal() {
    document.getElementById('modal').style.display = 'flex';
}

function cerrarModal() {
    document.getElementById('modal').style.display = 'none';
}
</script>

</body>
</html>
